{% extends "base.html" %}

{% block title %}{{ project.title }} - Isaak J. Liptzin{% endblock %}

{% block content %}
<section class="project-detail">
    <div class="project-container">
        <a href="{{ back_url }}" class="back-link">← Back to {{ back_label }}</a>

        <h1>{{ project.title }}</h1>
        <p class="project-description">{{ project.description }}</p>

        <div class="video-container" {% if project.aspect_ratio %}style="aspect-ratio: {{ project.aspect_ratio }}"{% endif %}>
            <iframe src="https://player.vimeo.com/video/{{ project.vimeo_id }}"
                    frameborder="0"
                    allow="autoplay; fullscreen; picture-in-picture"
                    allowfullscreen></iframe>
        </div>
    </div>
</section>
{% endblock %}
