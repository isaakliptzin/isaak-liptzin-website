<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Isaak J. Liptzin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="{{ url_for('index') }}" class="logo">Isaak J. Liptzin</a>
                <ul class="nav-links">
                    <li><a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Home</a></li>
                    <li><a href="{{ url_for('documentary') }}" {% if request.endpoint == 'documentary' %}class="active"{% endif %}>Films</a></li>
                    <li><a href="{{ url_for('news_events') }}" {% if request.endpoint == 'news_events' %}class="active"{% endif %}>Other Work</a></li>
                    <li><a href="{{ url_for('press') }}" {% if request.endpoint == 'press' %}class="active"{% endif %}>Press</a></li>
                    <li><a href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}class="active"{% endif %}>About</a></li>
                </ul>
                <div class="nav-social">
                    <a href="mailto:isaak.liptzin@gmail.com" title="Email" class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                    </a>
                    <a href="https://www.instagram.com" target="_blank" rel="noopener" title="Instagram" class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37Z"/>
                            <circle cx="17.5" cy="6.5" r="1.5"/>
                        </svg>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Isaak J. Liptzin</p>
            <div class="social-links">
                <a href="https://www.instagram.com" target="_blank" rel="noopener">Instagram</a>
                <a href="mailto:isaak.liptzin@gmail.com">Email</a>
            </div>
        </div>
    </footer>
</body>
</html>
