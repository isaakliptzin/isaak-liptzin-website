{% extends "base.html" %}

{% block title %}Films - Isaak J. Liptzin{% endblock %}

{% block content %}
<section class="work-section">
    <div class="projects-grid">
        {% for project in projects %}
        <a href="/documentary/{{ project.id }}/" class="project-card">
            <div class="project-thumbnail">
                <iframe src="https://player.vimeo.com/video/{{ project.vimeo_id }}"
                        frameborder="0"
                        allow="autoplay; fullscreen; picture-in-picture"
                        allowfullscreen></iframe>
            </div>
            <h3>{{ project.title }} <span class="project-meta">{{ project.meta }}</span></h3>
            <p>{{ project.description | safe }}</p>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
